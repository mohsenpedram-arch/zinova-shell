global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: arzin-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: arzin-service

  - job_name: otel-collector
    static_configs:
      - targets: ['arzin-otel:8889']
